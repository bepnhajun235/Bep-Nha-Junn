<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bếp Nhà Junn</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:#fff8f0;
        }

        header{
            background:#ff7a00;
            color:white;
            text-align:center;
            padding:20px;
        }

        nav{
            background:#333;
            padding:12px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
            font-weight:bold;
        }

        .menu{
            padding:20px;
        }

        .card{
            background:white;
            border-radius:12px;
            padding:15px;
            margin-bottom:15px;
            box-shadow:0 2px 8px rgba(0,0,0,.15);
        }

        .price{
            color:red;
            font-weight:bold;
            font-size:20px;
        }

        button{
            background:#ff7a00;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
        }
    </style>

</head>

<body>

<header>
    <h1>🍳 Bếp Nhà Junn</h1>
    <p>Đồ ăn ngon mỗi ngày</p>
</header>

<nav>
    <a href="#">Trang chủ</a>
    <a href="#">Menu</a>
    <a href="#">Liên hệ</a>
</nav>

<section class="menu">

<div class="card">
<h2>Cơm gà</h2>
<p>Thơm ngon, nóng hổi.</p>
<p class="price">45.000đ</p>
<button>Đặt món</button>
</div>

<div class="card">
<h2>Mì bò</h2>
<p>Nước dùng đậm đà.</p>
<p class="price">55.000đ</p>
<button>Đặt món</button>
</div>

</section>

</body>
</html>
